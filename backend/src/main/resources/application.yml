server:
  port: 8080

spring:
  profiles:
    active: dev
  mvc:
    async:
      request-timeout: 3600000  # 1小时，直播流需要长连接

# 摄像头通用配置（可被环境配置覆盖）
camera:
  rtsp:
    port: 8554
  ffmpeg:
    path: ffmpeg
    framerate: 25
    resolution: 1920x1080
    bitrate-kbps: 2000
    preset: ultrafast
    auto-retry: true
    max-retry: 3
    retry-delay-seconds: 5
  stream:
    segment-duration-minutes: 10
    segment-max-size-mb: 100
    temp-dir: ${java.io.tmpdir}/smart-camera/segments
    preview-buffer-size: 512
  storage:
    retention-days: 30
    cleanup-cron: "0 0 2 * * ?"

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

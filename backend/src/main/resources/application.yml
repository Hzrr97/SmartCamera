server:
  port: 8080

camera:
  rtsp:
    port: 8554
  ffmpeg:
    path: ffmpeg
    framerate: 25
    resolution: 1920x1080
    bitrate-kbps: 2000
    preset: ultrafast
    device:
      linux: /dev/video0
      windows: "USB Camera"
    auto-retry: true
    max-retry: 3
    retry-delay-seconds: 5
  stream:
    segment-duration-minutes: 10
    segment-max-size-mb: 100
    temp-dir: ${java.io.tmpdir}/smart-camera/segments
    preview-buffer-size: 512
  storage:
    retention-days: 30
    cleanup-cron: "0 0 2 * * ?"

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: streams

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smart_camera?useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

logging:
  level:
    com.smartcamera: INFO
    io.netty: WARN
  file:
    name: logs/smart-camera.log
    max-size: 50MB
    max-history: 7

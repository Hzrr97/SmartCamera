# 生产环境配置
# 敏感信息通过环境变量注入

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:smart_camera}?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

camera:
  ffmpeg:
    device:
      linux: ${CAMERA_DEVICE:/dev/video0}
      windows: ${CAMERA_DEVICE:USB Camera}
    auto-retry: true
    max-retry: 5

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:streams}

logging:
  level:
    com.smartcamera: INFO
    io.netty: WARN
  file:
    name: logs/smart-camera.log
    max-size: 100MB
    max-history: 30
